<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Editor</title>
<style>html,body,#editor{margin:0;padding:0;width:100%;height:100vh;overflow:hidden;}</style>
</head>
<body>
<div id="editor"></div>
<script src="/web-apps/apps/api/documents/api.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var docId = params.get('docId');
  var title = params.get('title') || 'Documento';
  var ext = params.get('ext') || 'docx';
  var apiBase = params.get('apiBase') || '';
  var docType = ['xlsx','xls','csv','ods'].includes(ext) ? 'cell'
    : ['pptx','ppt','odp'].includes(ext) ? 'slide' : 'word';
  var editor = new DocsAPI.DocEditor('editor', {
    document: {
      fileType: ext,
      key: docId + '-' + Date.now(),
      title: title,
      url: apiBase + '/api/documents/' + docId + '/file',
      permissions: { edit: true, download: true, print: true, review: true, comment: true }
    },
    documentType: docType,
    editorConfig: {
      callbackUrl: apiBase + '/api/documents/' + docId + '/onlyoffice-callback',
      lang: 'es',
      user: { id: 'sgi-user', name: 'Usuario SGI' },
      customization: {
        autosave: true, forcesave: true, compactHeader: true,
        logo: { visible: false }, chat: false, uiTheme: 'theme-light'
      }
    },
    width: '100%', height: '100%'
  });
})();
</script>
</body>
</html>
