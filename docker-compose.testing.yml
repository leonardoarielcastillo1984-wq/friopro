version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sgi-postgres-testing
    environment:
      POSTGRES_DB: sgi
      POSTGRES_USER: sgi
      POSTGRES_PASSWORD: sgi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_testing:/var/lib/postgresql/data
    networks:
      - sgi-testing-network

  # Redis (optional, for caching and queues)
  redis:
    image: redis:7-alpine
    container_name: sgi-redis-testing
    ports:
      - "6380:6379"
    volumes:
      - redis_data_testing:/data
    networks:
      - sgi-testing-network

  # OLLAMA LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: sgi-ollama-testing
    ports:
      - "11435:11434"
    volumes:
      - ollama_data_testing:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - sgi-testing-network
    restart: unless-stopped

  # API Backend
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: sgi-api-testing
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://sgi:sgi@postgres:5432/sgi
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://46.62.253.81:4000,http://localhost:3000,http://127.0.0.1:3000
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: ./uploads
      EMAIL_PROVIDER: console
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: llama3.2
    ports:
      - "4002:4002"
    volumes:
      - api_uploads_testing:/app/uploads
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - sgi-testing-network

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: sgi-web-testing
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_URL: http://46.62.253.81:4000
      API_URL: http://api:4002
    ports:
      - "127.0.0.1:4001:3000"
    depends_on:
      - api
    networks:
      - sgi-testing-network

volumes:
  postgres_data_testing:
  redis_data_testing:
  ollama_data_testing:
  api_uploads_testing:

networks:
  sgi-testing-network:
    driver: bridge
