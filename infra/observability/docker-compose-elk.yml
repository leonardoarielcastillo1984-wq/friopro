version: '3.8'

services:
  # Elasticsearch - Distributed search and analytics engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: sgi360-elasticsearch
    restart: unless-stopped

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic123!@#}
      - xpack.license.self_generated.type=trial
      - ES_JAVA_OPTS=-Xms512m -Xmx512m

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./elastic-certs:/usr/share/elasticsearch/config/certs:ro

    ports:
      - "9200:9200"
      - "9300:9300"

    healthcheck:
      test: ['CMD-SHELL', 'curl -s -u elastic:${ELASTIC_PASSWORD:-elastic123!@#} http://localhost:9200 | grep -q "cluster"']
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - sgi360-elk

  # Logstash - Data processing pipeline
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: sgi360-logstash
    restart: unless-stopped

    environment:
      - ELASTIC_HOST=elasticsearch
      - ELASTIC_PORT=9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic123!@#}
      - LS_JAVA_OPTS=-Xmx256m -Xms256m

    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logstash-patterns:/usr/share/logstash/patterns:ro
      - /var/log/sgi360:/var/log/sgi360:ro

    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"

    depends_on:
      elasticsearch:
        condition: service_healthy

    networks:
      - sgi360-elk

    command: logstash -f /usr/share/logstash/pipeline/logstash.conf

  # Kibana - Visualization and exploration platform
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: sgi360-kibana
    restart: unless-stopped

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-elastic123!@#}
      - xpack.security.enabled=true
      - SERVER_NAME=kibana.example.com
      - KIBANA_DEFAULTAPPID=discover

    volumes:
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana_data:/usr/share/kibana/data

    ports:
      - "5601:5601"

    depends_on:
      elasticsearch:
        condition: service_healthy

    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:5601/api/status | grep -q "state"']
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - sgi360-elk

  # Filebeat - Lightweight log shipper
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: sgi360-filebeat
    restart: unless-stopped

    environment:
      - ELASTIC_HOST=elasticsearch
      - ELASTIC_PORT=9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic123!@#}

    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/log/sgi360:/var/log/sgi360:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    depends_on:
      elasticsearch:
        condition: service_healthy

    networks:
      - sgi360-elk

    command: filebeat -e -strict.perms=false

  # Metricbeat - System and service metrics
  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.11.0
    container_name: sgi360-metricbeat
    restart: unless-stopped

    environment:
      - ELASTIC_HOST=elasticsearch
      - ELASTIC_PORT=9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic123!@#}

    volumes:
      - ./metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
      - /:/hostfs:ro

    depends_on:
      elasticsearch:
        condition: service_healthy

    networks:
      - sgi360-elk

    command: metricbeat -e -strict.perms=false

  # Heartbeat - Uptime monitoring
  heartbeat:
    image: docker.elastic.co/beats/heartbeat:8.11.0
    container_name: sgi360-heartbeat
    restart: unless-stopped

    environment:
      - ELASTIC_HOST=elasticsearch
      - ELASTIC_PORT=9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic123!@#}

    volumes:
      - ./heartbeat.yml:/usr/share/heartbeat/heartbeat.yml:ro

    depends_on:
      elasticsearch:
        condition: service_healthy

    networks:
      - sgi360-elk

    command: heartbeat -e -strict.perms=false

volumes:
  elasticsearch_data:
    driver: local
  kibana_data:
    driver: local

networks:
  sgi360-elk:
    driver: bridge
