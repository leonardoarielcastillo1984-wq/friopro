# Logstash Configuration for SGI 360
# Processes logs from multiple sources and streams to Elasticsearch

input {
  # API Application Logs
  file {
    path => "/var/log/sgi360/api/*.log"
    start_position => "beginning"
    tags => ["api", "app"]
    codec => json
  }

  # Web Application Logs
  file {
    path => "/var/log/sgi360/web/*.log"
    start_position => "beginning"
    tags => ["web", "app"]
    codec => json
  }

  # Authentication Logs
  file {
    path => "/var/log/sgi360/auth/*.log"
    start_position => "beginning"
    tags => ["auth", "security"]
    codec => json
  }

  # Audit Trail Logs
  file {
    path => "/var/log/sgi360/audit/*.log"
    start_position => "beginning"
    tags => ["audit", "security"]
    codec => json
  }

  # Database Logs
  file {
    path => "/var/log/sgi360/database/*.log"
    start_position => "beginning"
    tags => ["database"]
    codec => json
  }

  # Error Logs
  file {
    path => "/var/log/sgi360/error/*.log"
    start_position => "beginning"
    tags => ["error"]
  }

  # System Logs
  file {
    path => "/var/log/sgi360/system/*.log"
    start_position => "beginning"
    tags => ["system"]
  }

  # Nginx Access Logs
  file {
    path => "/var/log/nginx/access.log"
    start_position => "beginning"
    tags => ["nginx", "web"]
    codec => multiline {
      pattern => "^\s"
      what => "previous"
    }
  }

  # Nginx Error Logs
  file {
    path => "/var/log/nginx/error.log"
    start_position => "beginning"
    tags => ["nginx", "error"]
  }

  # Syslog
  syslog {
    port => 5000
    tags => ["syslog"]
  }

  # TCP Input for streaming logs
  tcp {
    port => 5001
    codec => json
  }

  # UDP Input
  udp {
    port => 5002
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "MMM dd, yyyy HH:mm:ss"]
    target => "@timestamp"
  }

  # Grok parsing for nginx logs
  if "nginx" in [tags] {
    grok {
      match => {
        "message" => '%{IPORHOST:remote_ip} - %{DATA:remote_user} \[%{HTTPDATE:access_time}\] "%{WORD:http_method} %{DATA:url} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code} %{NUMBER:body_sent_bytes} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
    }

    # Parse user agent
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }

  # Security event enrichment
  if "security" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "security-%{+YYYY.MM.dd}" }
    }
  }

  # API log enrichment
  if "api" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "api-%{+YYYY.MM.dd}" }
    }

    # Extract API path and method
    if [message] =~ /method/ {
      json {
        source => "message"
        target => "api"
      }
    }
  }

  # Authentication log enrichment
  if "auth" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "auth-%{+YYYY.MM.dd}" }
    }

    # Alert on failed logins
    if [message] =~ /failed|unauthorized/ {
      mutate {
        add_tag => ["auth_failure"]
      }
    }

    # Alert on successful logins
    if [message] =~ /success|authenticated/ {
      mutate {
        add_tag => ["auth_success"]
      }
    }
  }

  # Audit log enrichment
  if "audit" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "audit-%{+YYYY.MM.dd}" }
    }

    json {
      source => "message"
      target => "audit"
    }
  }

  # Database log enrichment
  if "database" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "database-%{+YYYY.MM.dd}" }
    }

    # Alert on slow queries
    if [message] =~ /slow|duration/ {
      mutate {
        add_tag => ["slow_query"]
      }
    }
  }

  # Error log enrichment
  if "error" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "error-%{+YYYY.MM.dd}" }
      add_tag => ["error_event"]
    }

    # Parse stack traces
    multiline {
      pattern => "^at "
      what => "previous"
    }
  }

  # Add hostname and environment
  mutate {
    add_field => {
      "hostname" => "%{HOSTNAME}"
      "environment" => "%{ENVIRONMENT:production}"
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["host"]
  }

  # Conditional default index
  if ![@metadata][index] {
    mutate {
      add_field => { "[@metadata][index]" => "sgi360-%{+YYYY.MM.dd}" }
    }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTIC_HOST:elasticsearch}:${ELASTIC_PORT:9200}"]
    user => "${ELASTIC_USER:elastic}"
    password => "${ELASTIC_PASSWORD:elastic123!@#}"
    index => "%{[@metadata][index]}"
    ssl_certificate_verification => false
    doc_as_upsert => true
    retry_on_conflict => 3
  }

  # Output to stdout for debugging
  stdout {
    codec => rubydebug
  }

  # Alert on critical events
  if "auth_failure" in [tags] or "error_event" in [tags] or "slow_query" in [tags] {
    email {
      to => "admin@example.com"
      subject => "SGI360 Alert: %{tags}"
      body => "Event: %{message}"
    }
  }

  # Send to webhook for real-time alerts
  if "auth_failure" in [tags] {
    http {
      url => "https://webhook.example.com/alerts"
      http_method => "post"
      format => "json"
      mapping => {
        "level" => "critical"
        "source" => "sgi360"
        "event" => "%{message}"
        "timestamp" => "%{@timestamp}"
      }
    }
  }
}
