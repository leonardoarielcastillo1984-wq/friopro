# ModSecurity Core Rule Set Configuration
# Comprehensive WAF rules for SGI 360

# Enable ModSecurity
SecRuleEngine On

# Set the logging level
SecLogLevel 3

# Audit log configuration
SecAuditEngine On
SecAuditLogType Serial
SecAuditLog logs/modsecurity_audit.log

# Default action (block + log)
SecDefaultAction "phase:2,log,deny,status:403"

# Request body limit (10 MB)
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 1048576

# Response body limit (10 MB)
SecResponseBodyLimit 10485760

# Request and response limits
SecRequestBodyLimitAction ProcessPartial
SecResponseBodyLimitAction ProcessPartial

# Cleanup rules
SecRule REQUEST_HEADERS:Content-Type "text/xml" \
  "id:1000,chain,phase:1,status:400"
  SecRule REQUEST_BODY "(?:<|%3C)script"

# ========================================
# DDoS PROTECTION RULES
# ========================================

# Rate limiting - 100 requests per minute per IP
SecRule REQUEST_RATE "@gt 100" \
  "id:1001,phase:2,deny,status:429,msg:'Rate limit exceeded'"

# Connection rate limiting
SecRule CONN_RATE "@gt 50" \
  "id:1002,phase:2,deny,status:429,msg:'Connection rate limit exceeded'"

# Slow clients protection
SecRule REQUEST_HEADERS:Content-Length "@gt 10485760" \
  "id:1003,phase:1,deny,status:413,msg:'Request body too large'"

# ========================================
# BOT DETECTION RULES
# ========================================

# Block known bad User-Agents
SecRule REQUEST_HEADERS:User-Agent "@rx (BadBot|EvilBot|Crawler|Scanner)" \
  "id:2001,phase:1,deny,status:403,msg:'Malicious bot detected'"

# Block requests without User-Agent
SecRule REQUEST_HEADERS:User-Agent "@eq -" \
  "id:2002,phase:1,deny,status:400,msg:'Missing User-Agent header'"

# Block suspicious User-Agent patterns
SecRule REQUEST_HEADERS:User-Agent "@rx (curl|wget|python|perl|java[^script])" \
  "id:2003,phase:1,deny,status:403,msg:'Suspicious client detected'"

# ========================================
# SQL INJECTION PROTECTION
# ========================================

# Detect SQL comments
SecRule REQUEST_ARGS "@rx --[^a-zA-Z0-9]|;[[:space:]]*drop" \
  "id:3001,phase:2,deny,status:403,msg:'Possible SQL injection detected'"

# Detect UNION-based SQL injection
SecRule REQUEST_ARGS "@rx union[[:space:]]+select" \
  "id:3002,phase:2,deny,status:403,msg:'SQL UNION injection detected'"

# Detect stacked queries
SecRule REQUEST_ARGS "@rx ;[[:space:]]*(insert|update|delete|drop|create)" \
  "id:3003,phase:2,deny,status:403,msg:'Stacked SQL query detected'"

# Detect SQL keywords in suspicious patterns
SecRule REQUEST_ARGS "@rx '.*or.*'" \
  "id:3004,phase:2,deny,status:403,msg:'SQL injection attempt detected'"

# ========================================
# XSS PROTECTION
# ========================================

# Detect script tags
SecRule REQUEST_ARGS "@rx <script[^>]*>" \
  "id:4001,phase:2,deny,status:403,msg:'XSS attack detected'"

# Detect event handlers
SecRule REQUEST_ARGS "@rx on(load|error|click|focus)[^>]*=" \
  "id:4002,phase:2,deny,status:403,msg:'XSS event handler detected'"

# Detect javascript protocol
SecRule REQUEST_ARGS "@rx javascript:" \
  "id:4003,phase:2,deny,status:403,msg:'JavaScript protocol detected'"

# Detect iframe injection
SecRule REQUEST_ARGS "@rx <iframe[^>]*>" \
  "id:4004,phase:2,deny,status:403,msg:'Iframe injection detected'"

# ========================================
# COMMAND INJECTION PROTECTION
# ========================================

# Detect shell metacharacters
SecRule REQUEST_ARGS "@rx [;&|`$()]" \
  "id:5001,phase:2,deny,status:403,msg:'Shell metacharacter detected'"

# Detect command substitution
SecRule REQUEST_ARGS "@rx \$\(" \
  "id:5002,phase:2,deny,status:403,msg:'Command substitution detected'"

# ========================================
# PATH TRAVERSAL PROTECTION
# ========================================

# Detect directory traversal attempts
SecRule REQUEST_URI "@rx \.\./|\.\.%2f" \
  "id:6001,phase:1,deny,status:403,msg:'Path traversal detected'"

# Detect null byte injection
SecRule REQUEST_ARGS "@rx %00" \
  "id:6002,phase:2,deny,status:403,msg:'Null byte injection detected'"

# ========================================
# AUTHENTICATION & SESSION PROTECTION
# ========================================

# Enforce strong password policy in POST data
SecRule REQUEST_METHOD "@eq POST" \
  "id:7001,phase:2,chain,msg:'Weak password format'"
  SecRule REQUEST_ARGS:password "@rx ^.{0,7}$"
    "deny,status:400"

# Detect session fixation attempts
SecRule COOKIES:PHPSESSID "@rx ^[a-f0-9]{32}$" \
  "id:7002,phase:2,chain,msg:'Suspicious session ID'"
  SecRule REQUEST_METHOD "@eq POST"
    "deny,status:403"

# ========================================
# SENSITIVE DATA PROTECTION
# ========================================

# Prevent credit card data transmission
SecRule REQUEST_ARGS "@rx \d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}" \
  "id:8001,phase:2,deny,status:403,msg:'Credit card data detected'"

# Prevent SSN transmission
SecRule REQUEST_ARGS "@rx \d{3}-\d{2}-\d{4}" \
  "id:8002,phase:2,deny,status:403,msg:'SSN data detected'"

# ========================================
# RESPONSE PROTECTION
# ========================================

# Prevent information disclosure in error pages
SecRule RESPONSE_STATUS "@rx ^5[0-9]{2}$" \
  "id:9001,phase:4,chain,log,msg:'Server error detected'"
  SecRule RESPONSE_BODY "@rx (at line|function|object Array)" \
    "deny,status:500"

# ========================================
# CUSTOM RULES FOR SGI 360
# ========================================

# Protect 2FA endpoints
SecRule REQUEST_URI "@beginsWith /api/2fa/" \
  "id:10001,phase:2,chain,msg:'2FA endpoint access attempted'"
  SecRule REMOTE_USER "@eq -" \
    "deny,status:401"

# Require authentication for admin endpoints
SecRule REQUEST_URI "@beginsWith /api/admin/" \
  "id:10002,phase:1,chain,msg:'Admin endpoint access attempt'"
  SecRule HTTP_AUTHORIZATION "@eq -" \
    "deny,status:401"

# Rate limit login attempts
SecRule REQUEST_URI "@eq /api/auth/login" \
  "id:10003,phase:2,chain,deny,status:429,msg:'Login rate limit exceeded'"
  SecRule REQUEST_RATE "@gt 10"

# Protect document upload endpoints
SecRule REQUEST_URI "@beginsWith /api/documents" \
  "id:10004,phase:1,chain,msg:'Document upload protection'"
  SecRule REQUEST_METHOD "@eq POST"
    "chain"
    SecRule CONTENT_TYPE "@rx ^multipart/form-data" \
      "chain"
      SecRule ARGS:filename "@rx \.(exe|bat|cmd|sh|php|jsp|asp)$" \
        "deny,status:400,msg:'Executable file upload blocked'"

# ========================================
# EXCEPTIONS AND WHITELIST
# ========================================

# Whitelist health check endpoint
SecRule REQUEST_URI "@eq /api/health" \
  "id:11001,phase:1,pass,msg:'Health check whitelist'"

# Whitelist public API endpoints
SecRule REQUEST_URI "@beginsWith /api/public/" \
  "id:11002,phase:1,pass,msg:'Public API whitelist'"

# Allow JSON API calls from trusted headers
SecRule REQUEST_HEADERS:X-API-Key "@rx ^[a-zA-Z0-9]{32}$" \
  "id:11003,phase:1,pass,msg:'API Key whitelist'"

# ========================================
# LOGGING AND ALERTS
# ========================================

# Log all denied requests
SecRule REQUEST_METHOD "@rx ^(GET|POST|PUT|DELETE)$" \
  "id:12001,phase:2,log,msg:'Request logged for audit'"

# Send alert on critical rules
SecRule REQUEST_ARGS "@rx <script" \
  "id:12002,phase:2,log,deny,status:403,msg:'CRITICAL: XSS attempt detected - IP: %{REMOTE_ADDR}'"

SecRule REQUEST_URI "@rx (union|select|drop|delete)" \
  "id:12003,phase:2,log,deny,status:403,msg:'CRITICAL: SQL injection attempt detected - IP: %{REMOTE_ADDR}'"

# Log authentication failures
SecRule REQUEST_URI "@eq /api/auth/login" \
  "id:12004,phase:2,chain,log,msg:'Login attempt: %{REMOTE_ADDR}'"
  SecRule RESPONSE_STATUS "@eq 401" \
    "log,msg:'Failed login attempt - IP: %{REMOTE_ADDR}'"
