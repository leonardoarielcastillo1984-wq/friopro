version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sgi-postgres
    environment:
      POSTGRES_DB: sgi
      POSTGRES_USER: sgi
      POSTGRES_PASSWORD: sgi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sgi-network

  # Redis (optional, for caching and queues)
  redis:
    image: redis:7-alpine
    container_name: sgi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sgi-network

  # OLLAMA LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: sgi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - sgi-network
    restart: unless-stopped

  # API Backend
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: sgi-api
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://sgi:sgi@postgres:5432/sgi
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:3000
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: ./uploads
      EMAIL_PROVIDER: console
    ports:
      - "3002:3002"
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - ollama
    networks:
      - sgi-network

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: sgi-web
    environment:
      NEXT_PUBLIC_API_URL: http://46.62.253.81:3002
      NEXT_PUBLIC_APP_URL: http://46.62.253.81:3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - sgi-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  api_uploads:

networks:
  sgi-network:
    driver: bridge
