version: '3.9'

services:
  # ========================================
  # PostgreSQL Database (Development)
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: sgi360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-sgi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sgidev123}
      POSTGRES_DB: ${DB_NAME:-sgi_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sgi} -d ${DB_NAME:-sgi_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sgi_network
    command:
      - "postgres"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_duration=on"

  # ========================================
  # Redis Cache (Development)
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: sgi360-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sgidev123} --loglevel notice
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sgidev123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgi_network

  # ========================================
  # API Server (Development)
  # ========================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: sgi360-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-sgi}:${DB_PASSWORD:-sgidev123}@postgres:5432/${DB_NAME:-sgi_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-sgidev123}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-min-32-chars-required}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      API_URL: ${API_URL:-http://localhost:3002}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_API_URL: ${FRONTEND_API_URL:-http://localhost:3002}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER:-dev}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-dev}
      SMTP_FROM: ${SMTP_FROM:-noreply@sgi360-dev.local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-dev}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-dev}
      S3_BUCKET: ${S3_BUCKET:-sgi-360-dev}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      TWO_FA_ISSUER: ${TWO_FA_ISSUER:-SGI360-Dev}
      TWO_FA_WINDOW_SIZE: ${TWO_FA_WINDOW_SIZE:-1}
      TWO_FA_BACKUP_CODES_COUNT: ${TWO_FA_BACKUP_CODES_COUNT:-10}
    ports:
      - "${API_PORT:-3002}:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/uploads:/app/apps/api/uploads
      - /app/apps/api/node_modules
    networks:
      - sgi_network
    command: npm run dev
    stdin_open: true
    tty: true

  # ========================================
  # Frontend Web Server (Development)
  # ========================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: sgi360-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:3002}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3002}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/.next
      - /app/apps/web/node_modules
    networks:
      - sgi_network
    command: npm run dev
    stdin_open: true
    tty: true

networks:
  sgi_network:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
