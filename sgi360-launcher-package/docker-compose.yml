version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sgi360-postgres
    environment:
      POSTGRES_USER: sgi360
      POSTGRES_PASSWORD: sgi360_dev_pass
      POSTGRES_DB: sgi360_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgi360"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgi360-network

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: sgi360-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgi360-network

volumes:
  postgres_data:
  redis_data:

networks:
  sgi360-network:
    driver: bridge
