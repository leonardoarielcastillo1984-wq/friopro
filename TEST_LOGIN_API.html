<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Login API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 30px; text-align: center; }
    .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .section h2 { font-size: 16px; color: #666; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 10px; }
    button:hover { background: #1d4ed8; }
    button.secondary { background: #6b7280; }
    button.secondary:hover { background: #4b5563; }
    pre { background: #f3f4f6; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; margin-top: 10px; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .info { color: #3b82f6; }
    .status { padding: 10px; border-radius: 4px; margin-top: 10px; }
    input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; margin-right: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Test Login API</h1>

    <div class="section">
      <h2>1️⃣ Test Mock API (localhost:3001)</h2>
      <button onclick="testMockAPI()">Test Mock API</button>
      <pre id="mockApiResult"></pre>
    </div>

    <div class="section">
      <h2>2️⃣ Test Next.js Route Handler (localhost:3000)</h2>
      <button onclick="testNextJsRoute()">Test Next.js Route</button>
      <pre id="nextJsResult"></pre>
    </div>

    <div class="section">
      <h2>3️⃣ Full Login Flow Test</h2>
      <input type="email" id="email" placeholder="Email" value="admin@sgi360.com">
      <input type="password" id="password" placeholder="Password" value="Admin123!">
      <button onclick="testFullLogin()">Test Full Login</button>
      <pre id="fullLoginResult"></pre>
    </div>

    <div class="section">
      <h2>📊 Test Results Summary</h2>
      <div id="summary"></div>
    </div>
  </div>

  <script>
    const results = {};

    function log(id, message, type = 'info') {
      const elem = document.getElementById(id);
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
      elem.textContent += `[${timestamp}] ${color} ${message}\n`;
      console.log(`[${type}]`, message);
    }

    function clear(id) {
      document.getElementById(id).textContent = '';
    }

    async function testMockAPI() {
      clear('mockApiResult');
      log('mockApiResult', 'Starting Mock API test...', 'info');

      try {
        const response = await fetch('http://localhost:3001/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: 'admin@sgi360.com',
            password: 'Admin123!'
          })
        });

        log('mockApiResult', `Status: ${response.status}`, 'info');
        const data = await response.json();

        if (response.ok) {
          results.mockApi = true;
          log('mockApiResult', `Response received successfully`, 'success');
          log('mockApiResult', `Data: ${JSON.stringify(data, null, 2)}`, 'info');
        } else {
          results.mockApi = false;
          log('mockApiResult', `Error: ${data.error}`, 'error');
        }
      } catch (error) {
        results.mockApi = false;
        log('mockApiResult', `Error: ${error.message}`, 'error');
      }
      updateSummary();
    }

    async function testNextJsRoute() {
      clear('nextJsResult');
      log('nextJsResult', 'Starting Next.js Route test...', 'info');

      try {
        const response = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: 'admin@sgi360.com',
            password: 'Admin123!'
          })
        });

        log('nextJsResult', `Status: ${response.status}`, 'info');
        const data = await response.json();

        if (response.ok && data.token) {
          results.nextJsRoute = true;
          log('nextJsResult', `Response received successfully`, 'success');
          log('nextJsResult', `Token received: ${data.token}`, 'success');
          log('nextJsResult', `User: ${JSON.stringify(data.user, null, 2)}`, 'info');
        } else {
          results.nextJsRoute = false;
          log('nextJsResult', `Error: ${data.error || 'No token in response'}`, 'error');
          log('nextJsResult', `Full response: ${JSON.stringify(data, null, 2)}`, 'error');
        }
      } catch (error) {
        results.nextJsRoute = false;
        log('nextJsResult', `Error: ${error.message}`, 'error');
      }
      updateSummary();
    }

    async function testFullLogin() {
      clear('fullLoginResult');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      log('fullLoginResult', `Testing login with ${email}...`, 'info');

      try {
        const response = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        log('fullLoginResult', `Response Status: ${response.status}`, 'info');

        if (!response.ok) {
          results.fullLogin = false;
          log('fullLoginResult', `Error: ${data.error}`, 'error');
          return;
        }

        if (!data.accessToken) {
          results.fullLogin = false;
          log('fullLoginResult', `No accessToken in response!`, 'error');
          log('fullLoginResult', `Response: ${JSON.stringify(data, null, 2)}`, 'error');
          return;
        }

        results.fullLogin = true;
        log('fullLoginResult', `✅ Login successful!`, 'success');
        log('fullLoginResult', `Token: ${data.accessToken}`, 'success');
        log('fullLoginResult', `User: ${JSON.stringify(data.user)}`, 'info');

        // Try to store in localStorage
        localStorage.setItem('accessToken', data.accessToken);
        if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
        log('fullLoginResult', `Stored in localStorage`, 'success');

      } catch (error) {
        results.fullLogin = false;
        log('fullLoginResult', `Error: ${error.message}`, 'error');
      }
      updateSummary();
    }

    function updateSummary() {
      const summary = document.getElementById('summary');
      const status = {
        'Mock API (3001)': results.mockApi ? '✅ Pass' : results.mockApi === false ? '❌ Fail' : '⏳ Not tested',
        'Next.js Route (3000)': results.nextJsRoute ? '✅ Pass' : results.nextJsRoute === false ? '❌ Fail' : '⏳ Not tested',
        'Full Login Flow': results.fullLogin ? '✅ Pass' : results.fullLogin === false ? '❌ Fail' : '⏳ Not tested'
      };

      summary.innerHTML = Object.entries(status)
        .map(([key, value]) => `<div style="padding: 8px; margin: 5px 0; background: #f3f4f6; border-radius: 4px;">${key}: ${value}</div>`)
        .join('');
    }

    // Auto-test on load
    window.addEventListener('load', () => {
      log('mockApiResult', 'Page loaded. Click buttons to test.', 'info');
    });
  </script>
</body>
</html>
